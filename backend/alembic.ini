# Alembic configuration for the AD Assistant backend.
# The database URL is taken from app.core.config (DATABASE_URL env var)
# inside migrations/env.py; sqlalchemy.url here is intentionally blank.

[alembic]
script_location = migrations
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

sqlalchemy.url =

[post_write_hooks]
# Keep generated revisions tidy with ruff.
hooks = ruff
ruff.type = exec
ruff.executable = .venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
