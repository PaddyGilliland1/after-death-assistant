# AD Assistant dev stack: Postgres 16 + pgvector, FastAPI backend (8471),
# Vite frontend (5173). Copy .env.example to .env first.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ad_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5474 (5432 and 5433 are taken by other projects on this machine)
      - "5474:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ad_assistant"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    ports:
      - "8471:8471"
    env_file:
      - path: .env
        required: false
    environment:
      # Inside the compose network the DB host is the service name, so this
      # overrides any localhost URL from .env.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ad_assistant
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8471 --reload
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8471
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  backend_storage:
  frontend_node_modules:
